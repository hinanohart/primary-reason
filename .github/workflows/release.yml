name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    name: Build wheel and publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
      - name: Publish to PyPI (trusted publishing, OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # Requires PyPI trusted publisher set up for hinanohart/primary-reason.
        # If not configured, this step fails — the release tag and GitHub Release still succeed.
        with:
          skip-existing: true
